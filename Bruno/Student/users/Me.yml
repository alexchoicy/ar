info:
  name: Me
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/users/me
  headers:
    - name: Authorization
      value: Bearer {{token}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
