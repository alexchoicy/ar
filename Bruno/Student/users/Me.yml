        - name: x-powered-by
          value: Express
        - name: x-request-id
          value: d08ddccc-3e3f-4e59-804e-b6f260414faf
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "191"
        - name: etag
          value: W/"bf-eYUKU8NM9ZWl4V8aI1MSaJOhfFE"
        - name: date
          value: Thu, 02 Jul 2026 10:13:41 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": {
