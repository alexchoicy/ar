info:
  name: Redeem
  type: http
  seq: 6

http:
  method: POST
  url: http://localhost:3000/api/users/redeem
  body:
    type: json
    data: |-
      {
        "type": "major"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
